services:
  bgutil-provider:
    # PO Token provider: yt-dlp fetches GVS PO tokens from here so YouTube
    # media downloads from a datacenter IP don't get HTTP 403.
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: bgutil-provider
    restart: always

  ytap-python:
    build: .
    env_file:
      - .env
    volumes:
      # Bootstrap cookies, read-only. Used only to seed the persistent volume
      # the first time. Create ./cookies.txt before `up`; it is gitignored.
      - ./cookies.txt:/app/cookies.txt:ro
      # Persistent working cookies: yt-dlp's refreshed cookies and any uploaded
      # via chat survive container restarts/rebuilds here.
      - cookies-data:/data
    depends_on:
      - bgutil-provider
    container_name: ytap-python
    restart: always

volumes:
  cookies-data:
